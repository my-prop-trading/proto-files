syntax = "proto3";
package rise_bridge;
import "google/protobuf/empty.proto";

enum RiseStatus {
    NONE = 0;
    PENDING = 1;
    READY = 2;
}

message GetStatusGrpcRequest {
    string client_id = 1;
}

message GetStatusGrpcResponse {
    string client_id = 1;
    RiseStatus status = 2;
}

message InviteGrpcRequest {
    string client_id = 1;
    string email = 2;
}

message InviteGrpcResponse {
    string client_id = 1;
    string email = 2;
    RiseStatus status = 3;
}

service RiseBridgeGrpcService {
    rpc GetStatus(GetStatusGrpcRequest) returns (GetStatusGrpcResponse);
    rpc Invite(InviteGrpcRequest) returns (InviteGrpcResponse);
    rpc Ping(google.protobuf.Empty) returns (google.protobuf.Empty);
}
