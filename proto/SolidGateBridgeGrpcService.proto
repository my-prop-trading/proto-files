syntax = "proto3";
package solidgate_bridge;
import "google/protobuf/empty.proto";

message CancelSubscriptionGrpcRequest {
    string subscription_id = 1;
    // Free-form audit reason carried to bridge logs/audit trail.
    // SolidGate's cancel_code is hard-coded to 8.14 (CustomerRequest) inside the bridge.
    string reason = 2;
    string ip = 3;
}

service SolidGateBridgeGrpcService {
    rpc CancelSubscription(CancelSubscriptionGrpcRequest) returns (google.protobuf.Empty);
    rpc Ping(google.protobuf.Empty) returns (google.protobuf.Empty);
}
