syntax = "proto3";
package boldsign_bridge;
import "google/protobuf/empty.proto";

// One template form field to pre-fill, keyed by the template's field id.
message BoldSignFormFieldGrpcModel {
    string id = 1;
    string value = 2;
}

// Send a contract to the trader from an existing BoldSign template, pre-filling its form
// fields. The trader is the only signing party — bound to the template's role 1.
message SendContractGrpcRequest {
    string template_id = 1;
    string signer_name = 2;
    string signer_email = 3;
    repeated BoldSignFormFieldGrpcModel fields = 4;
    // Optional overrides; when unset the template's own configuration applies.
    optional string title = 5;
    optional string message = 6;
    repeated string labels = 7;
    optional string brand_id = 8;
    optional bool disable_emails = 9;
}

message SendContractGrpcResponse {
    // BoldSign document id of the sent contract.
    string document_id = 1;
}

service BoldSignBridgeGrpcService {
    rpc SendContract(SendContractGrpcRequest) returns (SendContractGrpcResponse);
    rpc Ping(google.protobuf.Empty) returns (google.protobuf.Empty);
}
