syntax = "proto3";
package competitions;
import "google/protobuf/empty.proto";

enum CompetitionStatus {
  Draft = 0;
  RegistrationOpen = 1;
  Active = 2;
  Ended = 3;
}

// Current user's enrollment state for a competition (enrichment on list/detail
// when authenticated). Values prefixed because proto3 enum values share the
// package namespace with CompetitionStatus. Absent (unset optional) = anonymous.
enum EnrollmentStatus {
  EnrollmentNotEnrolled = 0;
  EnrollmentPending = 1;
  EnrollmentActive = 2;
}

// Current user's result in a competition (list card / detail enrichment).
message MyCompetitionResult {
  optional int32 rank = 1;       // null for DQ
  optional double profit_pct = 2; // null for DQ (dash)
  bool is_disqualified = 3;
}

message Competition {
  string id = 1;
  string name = 2;
  string description = 3;
  optional string prize_pool_title = 4;
  optional string prize_pool_description = 5;
  optional string prize_distribution_notes = 6;
  optional string prize_disclaimer = 7;
  optional string rules = 8;
  string package_id = 9;
  int32 max_participants = 10;
  int64 registration_opens_at = 11;
  int64 registration_closes_at = 12;
  int64 starts_at = 13;
  int64 ends_at = 14;
  competitions.CompetitionStatus status = 15;
  int64 created_at = 16;
  int64 updated_at = 17;
  int32 enrolled_count = 18;
  // Enrichment for authenticated list/detail calls (set when caller_client_id is
  // provided). Absent for anonymous / Save. `my_result` present only when the
  // caller participates.
  optional competitions.EnrollmentStatus enrollment_status = 19;
  optional competitions.MyCompetitionResult my_result = 20;
  // Prize preview shown on both the list card and the detail page (per Figma).
  // Ordered by sort_order, same shape as GetById's prize_tiers. Empty when the
  // competition has no tiers.
  repeated competitions.CompetitionPrizeTier prize_tiers = 21;
}

message CompetitionPrizeTier {
  string id = 1;
  string competition_id = 2;
  string place_label = 3;
  string prize_label = 4;
  int32 sort_order = 5;
}

message CompetitionEnrollment {
  string id = 1;
  string competition_id = 2;
  string client_id = 3;
  string trader_account_id = 4;
  double profit_pct = 5;
  bool is_disqualified = 6;
  int64 enrolled_at = 7;
}

message LeaderboardEntry {
  // rank/profit_pct are optional: DQ entries have neither (shown below ranked
  // positions with a dash). Non-DQ always have both.
  optional int32 rank = 1;
  string client_id = 2;
  string trader_account_id = 3;
  optional double profit_pct = 4;
  bool is_disqualified = 5;
  int64 enrolled_at = 6;
  // Display fields resolved from personal-data (enriched at build time):
  // "First L." and country of registration.
  string trader_name = 7;
  string country = 8;
  // is_current_user: null (unset) for anonymous calls; set true on the caller's
  // row and false on others when the request is authenticated. Resolved per
  // request at the API layer, not stored in the cache.
  optional bool is_current_user = 9;
}

// --- Competition CRUD ---

message GetPaginatedCompetitionsRequest {
  uint64 limit = 1;
  int64 offset = 2;
  optional competitions.CompetitionStatus status = 3;
  // Set from token at REST facade for authenticated calls; enriches each item
  // with enrollment_status / my_result. Empty for anonymous.
  optional string caller_client_id = 4;
  // ?participated=true — return only competitions the caller is enrolled in
  // (requires caller_client_id). Ignored when caller_client_id is empty.
  bool participated_only = 5;
}

message GetPaginatedCompetitionsResponse {
  repeated competitions.Competition items = 1;
  uint64 total = 2;
}

message GetCompetitionByIdRequest {
  string id = 1;
  // Enriches the returned competition with enrollment_status / my_result.
  optional string caller_client_id = 2;
}

message GetCompetitionByIdResponse {
  competitions.Competition competition = 1;
  repeated competitions.CompetitionPrizeTier prize_tiers = 2;
}

message SaveCompetitionRequest {
  competitions.Competition competition = 1;
  repeated competitions.CompetitionPrizeTier prize_tiers = 2;
}

message SaveCompetitionResponse {
  competitions.Competition competition = 1;
  repeated competitions.CompetitionPrizeTier prize_tiers = 2;
}

message DeleteCompetitionRequest {
  string id = 1;
}

message SetCompetitionStatusRequest {
  string id = 1;
  competitions.CompetitionStatus status = 2;
}

message SetCompetitionStatusResponse {
  competitions.Competition competition = 1;
}

// --- Enrollments ---

message GetEnrollmentsRequest {
  string competition_id = 1;
  uint64 limit = 2;
  int64 offset = 3;
}

message GetEnrollmentsResponse {
  repeated competitions.CompetitionEnrollment enrollments = 1;
  uint64 total = 2;
}

message EnrollClientRequest {
  string competition_id = 1;
  string client_id = 2;
  // Brand comes from the request context at the REST facade (get_brand_id),
  // like client_id — the internal gRPC call must receive it explicitly to
  // create the trader-account order under the right brand.
  string brand = 3;
}

message EnrollClientResponse {
  competitions.CompetitionEnrollment enrollment = 1;
}

// --- My enrollment (client area: GET /competitions/:id/my-enrollment) ---

message GetMyEnrollmentRequest {
  string competition_id = 1;
  string client_id = 2;
}

// Present only once the account is provisioned (enrollment Active). Mirrors the
// contract's `activeResult` block. Absent while Pending (account still being
// created). rank/profit_pct are absent for a disqualified participant.
message MyEnrollmentActiveResult {
  string trader_account_id = 1;
  optional int32 rank = 2;
  optional double profit_pct = 3;
  bool is_disqualified = 4;
  // Total participants in the competition (= enrolled_count) — for "#7 of N".
  int32 total_participants = 5;
}

message GetMyEnrollmentResponse {
  // NotEnrolled/Pending/Active. `active_result` is set only for Active.
  competitions.EnrollmentStatus enrollment_status = 1;
  // enrolled_at is 0 when the caller is not enrolled.
  int64 enrolled_at = 2;
  optional competitions.MyEnrollmentActiveResult active_result = 3;
}

// --- Leaderboard ---

message GetLeaderboardRequest {
  string competition_id = 1;
  uint64 limit = 2;
  int64 offset = 3;
  // Set from the token at the REST facade for authenticated calls; empty for
  // anonymous. Used to mark the caller's row (is_current_user) — resolved per
  // request, not stored in the cache.
  optional string caller_client_id = 4;
}

message GetLeaderboardResponse {
  repeated competitions.LeaderboardEntry entries = 1;
  uint64 total = 2;
}

service CompetitionsGrpcService {
  // Competition management (Backoffice — sees every status, incl. Draft)
  rpc GetPaginated(competitions.GetPaginatedCompetitionsRequest) returns (competitions.GetPaginatedCompetitionsResponse);
  rpc GetById(competitions.GetCompetitionByIdRequest) returns (competitions.GetCompetitionByIdResponse);
  rpc Save(competitions.SaveCompetitionRequest) returns (competitions.SaveCompetitionResponse);
  rpc Delete(competitions.DeleteCompetitionRequest) returns (google.protobuf.Empty);
  rpc SetStatus(competitions.SetCompetitionStatusRequest) returns (competitions.SetCompetitionStatusResponse);

  // Client area (REST facade) — NEVER returns Draft. Same request/response
  // shapes as the BO reads; the difference is the server excludes Draft.
  rpc GetPublicCompetitions(competitions.GetPaginatedCompetitionsRequest) returns (competitions.GetPaginatedCompetitionsResponse);
  rpc GetPublicCompetitionById(competitions.GetCompetitionByIdRequest) returns (competitions.GetCompetitionByIdResponse);

  // Enrollment
  rpc GetEnrollments(competitions.GetEnrollmentsRequest) returns (competitions.GetEnrollmentsResponse);
  rpc Enroll(competitions.EnrollClientRequest) returns (competitions.EnrollClientResponse);
  rpc GetMyEnrollment(competitions.GetMyEnrollmentRequest) returns (competitions.GetMyEnrollmentResponse);

  // Leaderboard
  rpc GetLeaderboard(competitions.GetLeaderboardRequest) returns (competitions.GetLeaderboardResponse);

  rpc Ping(google.protobuf.Empty) returns (google.protobuf.Empty);
}
