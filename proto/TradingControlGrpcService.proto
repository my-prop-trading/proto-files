syntax = "proto3";
package trading_control;

import "google/protobuf/empty.proto";

enum TradingObjectiveFailReasonGrpc {
  DAILY_LOSS_LEVEL = 0;
  OVERALL_LOSS_LEVEL = 1;
  TARGET_DATE = 2;
  LEGACY = 3;
  INACTIVITY = 4;
  TRIAL_ENDED = 5;
  EXPOSURE_LOSS_BREACH = 6;
  MARGIN_RULE = 7;
  MARGIN_RULE_PER_IDEA = 8;
  NONE = 999;
}

enum TradingObjectivePassRequirement {
  PASS_REQUIREMENT_UNSPECIFIED = 0;
  LIVE_ACCOUNT_NOT_ALLOWED = 1;
  TARGET_PROFIT_NOT_REACHED = 2;
  HAS_OPENED_POSITIONS = 3;
  NOT_ENOUGH_TRADING_DAYS = 4;
  DAILY_LOSS_LEVEL_BREACHED = 5;
  OVERALL_LOSS_LEVEL_BREACHED = 6;
  TARGET_DATE_EXPIRED = 7;
  BEST_DAY_RULE_BREACHED = 8;
}

message TradingMetricsGrpcModel {
  double average_win = 1;
  double average_loss = 2;
  double win_ratio = 3;
  double risk_ratio = 4;
  int32 traded_days_count = 5;
  double traded_days_percent = 6;
  double current_total_profit = 7;
  double profit_percent = 8;
  double max_daily_loss = 9;
  double max_daily_loss_recorded = 10;
  double max_daily_loss_percent = 11;
  double max_overall_loss_recorded = 12;
  double max_overall_loss_percent = 13;
  int32 min_trading_days_count = 14;
  double target_profit = 15;
  double max_overall_loss = 16;
  double overall_profit_percent = 17;
  double initial_balance = 18;
  double overall_loss_level = 19;
  double initial_balance_loss = 20;
  double current_equity = 21;
  double current_balance = 22;
  double initial_balance_loss_percent = 23;
  double daily_loss_level = 24;
  double daily_loss_percent = 25;
  double current_daily_loss = 26;
  double day_entry_equity = 27;
  string trader_account_id = 28;
  string client_id = 29;
  optional TradingObjectiveFailReasonGrpc objective_fail_reason = 30;
  double best_day_profit = 31;
  double best_day_ratio = 32;
  double best_day_cap = 33;
  BestDayRuleStatusGrpc best_day_rule_status = 34;
  double total_realized_profit = 35;
  repeated TradingObjectivePassRequirement pass_requirements = 36;
  repeated TradingMetricWarningGrpc warnings = 37;
  double margin_utilization_percent = 38;
  double max_profit = 39;
  double max_loss = 40;
  double avg_duration_sec = 41;
  double sharpe_ratio = 42;
  double expectancy_ratio = 43;
  double high_equity = 44;
  int32 drawdown_type = 45;
  double max_profit_pct = 46;
  double progress_pass_pct = 47;
}

enum BestDayRuleStatusGrpc {
  GOOD = 0;
  WARNING = 1;
  BREACHED = 2;
}

enum TradingMetricWarningGrpc {
  EXPOSURE_LOSS_SOFT_BREACH = 0;
  MARGIN_RULE_SOFT_BREACH = 1;
  MARGIN_RULE_PER_IDEA_SOFT_BREACH = 2;
}

message GetTradingMetricsGrpcRequest {
  string TraderAccountId = 1;
  string ClientId = 2;
}

message GetTradingMetricsGrpcResponse {
  TradingMetricsGrpcModel item = 1;
}

message AccountPeaksGrpcModel {
  string trader_account_id = 1;
  int64 updated_at = 2;
  double high_balance = 3;
  double low_equity_after_high_balance = 4;
  double high_max_overall_loss_recorded = 5;
  double best_day_profit = 6;
  int64 best_day_date = 7;
  int32 exposure_loss_soft_breach_count = 8;
  double last_low_exposure_pnl = 9;
  int32 margin_rule_soft_breaches = 10;
  int32 margin_rule_idea_soft_breaches = 11;
  optional int64 exposure_loss_last_soft_breach_at = 12;
  optional int64 margin_rule_last_soft_breach_at = 13;
  double high_equity = 14;
}

message GetAccountPeaksGrpcRequest {
  string TraderAccountId = 1;
}

message GetAccountPeaksGrpcResponse {
  AccountPeaksGrpcModel item = 1;
}

message FailTradingObjectiveGrpcRequest {
  string TraderAccountId = 1;
  TradingObjectiveFailReasonGrpc fail_reason = 2;
}

message FailTradingObjectiveGrpcResponse {
  bool is_success = 1;
  string message = 2;
}

message PassTradingObjectiveGrpcRequest {
  string TraderAccountId = 1;
}

message PassTradingObjectiveGrpcResponse {
  bool is_success = 1;
  string message = 2;
}

message AccountCandleGrpcModel {
  CandleInterval interval = 1;
  int64 date = 2;
  string trader_account_id = 3;
  AccountCandleDataGrpcModel balance_data = 4;
  AccountCandleDataGrpcModel equity_data = 5;
  AccountCandleDataGrpcModel pnl_data = 6;
}

message AccountCandleDataGrpcModel {
  double open = 1;
  double close = 2;
  double high = 3;
  double low = 4;
  double low_after_height = 5;
}

message GetAccountCandlesGrpcRequest {
  string TraderAccId = 1;
  int64 StartDate = 2;
  int64 EndDate = 3;
  optional CandleInterval Interval = 4;
}

message GetAccountCandlesGrpcResponse {
  repeated AccountCandleGrpcModel items = 1;
}

enum CandleInterval {
  Minute = 0;
  Hour = 1;
  Day = 2;
  Month = 3;
  ThreeMinutes = 4;
  FiveMinutes = 5;
  FifteenMinutes = 6;
  ThirtyMinutes = 7;
  TwoHours = 8;
  FourHours = 9;
  SixHours = 10;
  EightHours = 11;
  TwelveHours = 12;
  ThreeDays = 13;
  SevenDays = 14;
  Endless = 15;
}

message GetTotalNetProfitGrpcRequest {}

message GetTotalNetProfitGrpcResponse {
  double value = 1;
}

message TopTradingMetricsGrpcRequest {
  int32 limit = 1;
}

message TopTradingMetricsGrpcResponse {
  repeated TradingMetricsGrpcModel items = 1;
}

message InactivityItemGrpcModel {
  string trader_account_id = 1;
  string client_id = 2;
  string platform_id = 3;
  string platform_account_id = 4;
  int32 account_type = 5;
  int64 inactivity_deadline = 6;
}

message GetInactivityReportGrpcRequest {
  uint64 limit = 1;
  uint64 offset = 2;
  optional uint64 from_date = 3;
  optional uint64 to_date = 4;
}

message GetInactivityReportGrpcResponse {
  repeated InactivityItemGrpcModel items = 1;
}

message TradeIdeaGrpcModel {
  string trader_account_id = 1;
  string symbol = 2;
  int32 direction = 3;
  int64 end_date = 4;
  double pnl_open = 5;
  double pnl_close = 6;
  double pnl_high = 7;
  double pnl_low = 8;
  repeated string trade_ids = 9;
  double used_margin_open = 10;
  double used_margin_close = 11;
  double used_margin_high = 12;
  double used_margin_low = 13;
}

message GetTradeIdeasGrpcRequest {
  string trader_account_id = 1;
  uint32 limit = 2;
  uint32 offset = 3;
}

message GetTradeIdeasGrpcResponse {
  repeated TradeIdeaGrpcModel items = 1;
}

enum TradeSideGrpc {
  Long = 0;   // Buy
  Short = 1;  // Sell
}

enum WeekdayGrpc {
  Monday = 0;
  Tuesday = 1;
  Wednesday = 2;
  Thursday = 3;
  Friday = 4;
  Saturday = 5;
  Sunday = 6;
}

enum TradeDurationBucketGrpc {
  UnderOneMinute = 0;        // [0, 60)
  OneToFiveMinutes = 1;      // [60, 300)
  FiveToFifteenMinutes = 2;  // [300, 900)
  FifteenMinutesToOneHour = 3;  // [900, 3600)
  OneToFourHours = 4;        // [3600, 14400)
  FourToTwelveHours = 5;     // [14400, 43200)
  TwelveToTwentyFourHours = 6;  // [43200, 86400)
  OverOneDay = 7;            // [86400, +inf)
}

message SideAggregateGrpc {
  TradeSideGrpc side = 1;
  uint32 trades = 2;
  double result = 3;       // sum(net_profit)
  double win_rate = 4;     // 0..1
  double avg_profit = 5;   // mean(net_profit) of winning trades only
  double rr = 6;           // per-side avg_win / |avg_loss|, 0 if no losing trades
}

message InstrumentAggregateGrpc {
  string symbol = 1;
  uint32 trades_long = 2;
  double result_long = 3;
  uint32 trades_short = 4;
  double result_short = 5;
  uint32 trades_total = 6;
  double result_total = 7;
}

message WeekdayAggregateGrpc {
  WeekdayGrpc weekday = 1;
  double pnl = 2;
}

message DurationAggregateGrpc {
  TradeDurationBucketGrpc bucket = 1;
  double pnl = 2;
}

message CalendarDayGrpc {
  int64 date = 1;     // unix seconds, UTC midnight
  uint32 trades = 2;
  double pnl = 3;
}

message OpenTradeGrpc {
  string ticket = 1;
  string symbol = 2;
  TradeSideGrpc side = 3;
  double current_price = 4;
  double size = 5;
  int64 open_time = 6;
  double tp = 7;
  double sl = 8;
  double enter_price = 9;
  double pnl = 10;
  double fee = 11;
}

message GetTradesMetricsGrpcRequest {
  string trader_account_id = 1;
}

message GetTradesMetricsGrpcResponse {
  repeated SideAggregateGrpc sides = 1;
  repeated InstrumentAggregateGrpc instruments = 2;
  repeated WeekdayAggregateGrpc weekdays = 3;
  repeated DurationAggregateGrpc durations = 4;
  repeated CalendarDayGrpc calendar = 5;
}

message GetOpenTradesGrpcRequest {
  string trader_account_id = 1;
}

message GetOpenTradesGrpcResponse {
  repeated OpenTradeGrpc items = 1;
}

service TradingControlGrpcService {
  rpc GetTradingMetrics(GetTradingMetricsGrpcRequest) returns (GetTradingMetricsGrpcResponse);
  rpc GetAccountPeaks(GetAccountPeaksGrpcRequest) returns (GetAccountPeaksGrpcResponse);
  rpc FailTradingObjective(FailTradingObjectiveGrpcRequest) returns (FailTradingObjectiveGrpcResponse);
  rpc PassTradingObjective(PassTradingObjectiveGrpcRequest) returns (PassTradingObjectiveGrpcResponse);
  rpc GetAccountCandles(GetAccountCandlesGrpcRequest) returns (GetAccountCandlesGrpcResponse);
  rpc GetTotalNetProfit(GetTotalNetProfitGrpcRequest) returns (GetTotalNetProfitGrpcResponse);
  rpc TopTradingMetrics(TopTradingMetricsGrpcRequest) returns (TopTradingMetricsGrpcResponse);
  rpc GetInactivityReport(GetInactivityReportGrpcRequest) returns (GetInactivityReportGrpcResponse);
  rpc GetTradeIdeas(GetTradeIdeasGrpcRequest) returns (GetTradeIdeasGrpcResponse);
  rpc GetTradesMetrics(GetTradesMetricsGrpcRequest) returns (GetTradesMetricsGrpcResponse);
  rpc GetOpenTrades(GetOpenTradesGrpcRequest) returns (GetOpenTradesGrpcResponse);

  rpc Ping(google.protobuf.Empty) returns (google.protobuf.Empty);
}
